�õģ��ҽ�Ϊ���µݹ麯������һ���ɵ��ﰲ���Ϊ���µ�SVG��ͼ���ϸ�ʹ��ָ����ɫ�塣\n```svg\n<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 800 600\" font-family=\"'Courier New', monospace\">\n  <defs>\n    <linearGradient id=\"bgGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0%\" stop-color=\"#1a3a5c\"/>\n      <stop offset=\"100%\" stop-color=\"#2d5f8a\"/>\n    </linearGradient>\n    <linearGradient id=\"nodeGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0%\" stop-color=\"#4a85bb\"/>\n      <stop offset=\"100%\" stop-color=\"#2d5f8a\"/>\n    </linearGradient>\n    <linearGradient id=\"leafGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n      <stop offset=\"0%\" stop-color=\"#87b9e0\"/>\n      <stop offset=\"100%\" stop-color=\"#4a85bb\"/>\n    </linearGradient>\n    <filter id=\"shadow\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n      <feDropShadow dx=\"1\" dy=\"1\" stdDeviation=\"2\" flood-color=\"#1a3a5c\" flood-opacity=\"0.4\"/>\n    </filter>\n  </defs>\n\n  <!-- 背景 -->\n  <rect width=\"800\" height=\"600\" fill=\"url(#bgGrad)\"/>\n\n  <!-- 标题 -->\n  <text x=\"400\" y=\"38\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"18\" font-weight=\"bold\" letter-spacing=\"2\">\n    Fibonacci(5) — 递归调用树\n  </text>\n  <line x1=\"200\" y1=\"50\" x2=\"600\" y2=\"50\" stroke=\"#e8a840\" stroke-width=\"1\" opacity=\"0.6\"/>\n\n  <!-- 函数定义 -->\n  <text x=\"400\" y=\"72\" text-anchor=\"middle\" fill=\"#87b9e0\" font-size=\"11\" opacity=\"0.8\">\n    function fibonacci(n) { if (n &lt;= 1) return n; return fibonacci(n-1) + fibonacci(n-2); }\n  </text>\n\n  <!-- 根节点：fib(5) -->\n  <rect x=\"340\" y=\"90\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"400\" y=\"113\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(5)</text>\n\n  <!-- 第1层连接线 -->\n  <line x1=\"370\" y1=\"126\" x2=\"260\" y2=\"170\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"430\" y1=\"126\" x2=\"540\" y2=\"170\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第1层节点：fib(4) 和 fib(3) -->\n  <rect x=\"200\" y=\"170\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"260\" y=\"193\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(4)</text>\n\n  <rect x=\"480\" y=\"170\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"540\" y=\"193\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(3)</text>\n\n  <!-- 第2层连接线（左子树） -->\n  <line x1=\"230\" y1=\"206\" x2=\"160\" y2=\"250\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"290\" y1=\"206\" x2=\"360\" y2=\"250\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第2层连接线（右子树） -->\n  <line x1=\"510\" y1=\"206\" x2=\"440\" y2=\"250\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"570\" y1=\"206\" x2=\"640\" y2=\"250\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第2层节点：fib(3) 和 fib(2)（左子树） -->\n  <rect x=\"100\" y=\"250\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"160\" y=\"273\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(3)</text>\n\n  <rect x=\"300\" y=\"250\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"360\" y=\"273\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(2)</text>\n\n  <!-- 第2层节点：fib(2) 和 fib(1)（右子树） -->\n  <rect x=\"380\" y=\"250\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"440\" y=\"273\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(2)</text>\n\n  <rect x=\"580\" y=\"250\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"640\" y=\"273\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(1)</text>\n\n  <!-- 第3层连接线（左子树的左子树） -->\n  <line x1=\"130\" y1=\"286\" x2=\"80\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"190\" y1=\"286\" x2=\"240\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第3层连接线（左子树的右子树） -->\n  <line x1=\"330\" y1=\"286\" x2=\"280\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"390\" y1=\"286\" x2=\"420\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第3层连接线（右子树的左子树） -->\n  <line x1=\"410\" y1=\"286\" x2=\"360\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"470\" y1=\"286\" x2=\"500\" y2=\"330\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第3层节点：fib(2) 和 fib(1)（左子树的左子树） -->\n  <rect x=\"20\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#nodeGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"80\" y=\"353\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"14\" font-weight=\"bold\">fib(2)</text>\n\n  <rect x=\"180\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"240\" y=\"353\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(1)</text>\n\n  <!-- 第3层节点：fib(1) 和 fib(0)（左子树的右子树） -->\n  <rect x=\"220\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"280\" y=\"353\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(1)</text>\n\n  <rect x=\"360\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"420\" y=\"353\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(0)</text>\n\n  <!-- 第3层节点：fib(1) 和 fib(0)（右子树的左子树） -->\n  <rect x=\"300\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"360\" y=\"353\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(1)</text>\n\n  <rect x=\"440\" y=\"330\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"500\" y=\"353\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(0)</text>\n\n  <!-- 第4层连接线（最左子树） -->\n  <line x1=\"50\" y1=\"366\" x2=\"20\" y2=\"410\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n  <line x1=\"110\" y1=\"366\" x2=\"140\" y2=\"410\" stroke=\"#87b9e0\" stroke-width=\"1.5\" opacity=\"0.6\"/>\n\n  <!-- 第4层节点：fib(1) 和 fib(0) -->\n  <rect x=\"-40\" y=\"410\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"20\" y=\"433\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(1)</text>\n\n  <rect x=\"80\" y=\"410\" width=\"120\" height=\"36\" rx=\"18\" fill=\"url(#leafGrad)\" filter=\"url(#shadow)\"/>\n  <text x=\"140\" y=\"433\" text-anchor=\"middle\" fill=\"#1a3a5c\" font-size=\"14\" font-weight=\"bold\">fib(0)</text>\n\n  <!-- 底部信息 -->\n  <rect x=\"250\" y=\"490\" width=\"300\" height=\"80\" rx=\"8\" fill=\"#1a3a5c\" opacity=\"0.8\" stroke=\"#4a85bb\" stroke-width=\"1\"/>\n  <text x=\"400\" y=\"515\" text-anchor=\"middle\" fill=\"#e8a840\" font-size=\"12\" font-weight=\"bold\">递归终止条件</text>\n  <text x=\"400\" y=\"535\" text-anchor=\"middle\" fill=\"#87b9e0\" font-size=\"11\">if (n &lt;= 1) return n;</text>\n  <text x=\"400\" y=\"555\" text-anchor=\"middle\" fill=\"#f4f1ea\" font-size=\"11\">fib(0) = 0, fib(1) = 1</text>\n\n  <!-- 图例 -->\n  <rect x=\"30\" y=\"500\" width=\"14\" height=\"14\" rx=\"3\" fill=\"url(#nodeGrad)\"/>\n  <text x=\"50\" y=\"512\" fill=\"#87b9e0\" font-size=\"10\">内部节点 (n &gt; 1)</text>\n  <rect x=\"30\" y=\"522\" width=\"14\" height=\"14\" rx=\"3\" fill=\"url(#leafGrad)\"/>\n  <text x=\"50\" y=\"534\" fill=\"#87b9e0\" font-size=\"10\">叶子节点 (n &lt;= 1)</text>\n</svg>\n```\nͼ����“fib(5)”Ϊ���ڵ㣬���·�֧չʾ�˵��ù��̣���ͬ��ɫ���ֳ��ڲ��ڵ���Ҷ�ӽڵ㣬���ײ���ע�˵ݹ���ֹ����������ͼ���ڰ���˹��ɫ���ͼ�Լ�ض��ķ��ѧ���顣"},"logprobs":null,"finish_reason":"stop"}],"usage":{"prompt_tokens":312,"completion_tokens":3100,"total_tokens":3412,"prompt_tokens_details":{"cached_tokens":0},"prompt_cache_hit_tokens":0,"prompt_cache_miss_tokens":312},"system_fingerprint":"fp_8b330d02d0_prod0820_fp8_kvcache_20260402"}